version: '3.9'

services:

  # ── POSTGRESQL DATABASE ──────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: itsupport_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-itsupport}
      POSTGRES_USER:     ${POSTGRES_USER:-itsupport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - itsupport_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-itsupport} -d ${POSTGRES_DB:-itsupport}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── BACKEND API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: itsupport_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:             5000
      NODE_ENV:         ${NODE_ENV:-production}
      DATABASE_URL:     postgresql://${POSTGRES_USER:-itsupport}:${POSTGRES_PASSWORD:-changeme_strong_password}@db:5432/${POSTGRES_DB:-itsupport}
      JWT_SECRET:       ${JWT_SECRET:-change_this_jwt_secret_minimum_32_characters_long}
      ENCRYPTION_KEY:   ${ENCRYPTION_KEY:-change_this_32_char_encryption_k}
      FRONTEND_URL:     ${FRONTEND_URL:-http://localhost}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - itsupport_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── FRONTEND REACT APP ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api-proxy}
    container_name: itsupport_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - itsupport_net

  # ── NGINX REVERSE PROXY ──────────────────────────────────────────────────────
  # Single entry point: routes / → frontend, /api → backend
  nginx:
    image: nginx:alpine
    container_name: itsupport_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./docker/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - itsupport_net

  # ── CERTBOT (auto SSL) ───────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: itsupport_certbot
    volumes:
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done
      "
    networks:
      - itsupport_net
    profiles:
      - ssl

# ── VOLUMES ──────────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
  certbot_data:
    driver: local
  certbot_certs:
    driver: local

# ── NETWORKS ──────────────────────────────────────────────────────────────────
networks:
  itsupport_net:
    driver: bridge
